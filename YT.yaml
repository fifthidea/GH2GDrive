name: YouTube to Google Drive

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
      quality:
        description: 'Video quality (e.g., best, 720, 480)'
        required: true
        default: 'best'
      subtitles:
        description: 'Download subtitles? (yes/no)'
        required: true
        default: 'no'
      sub_lang:
        description: 'Subtitle language code (e.g., en, es, fr). Ignored if subtitles=no'
        required: false
        default: 'en'
      gdrive_folder_id:
        description: 'Google Drive Folder ID to upload to'
        required: true

jobs:
  upload-to-gdrive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip ffmpeg
          pip3 install yt-dlp pydrive oauth2client

      - name: Download YouTube video
        run: |
          SUBS_OPTION=""
          if [ "${{ github.event.inputs.subtitles }}" == "yes" ]; then
            LANG="${{ github.event.inputs.sub_lang }}"
            # Fallback logic via yt-dlp's --sub-lang with fallback
            SUBS_OPTION="--write-subs --sub-lang ${LANG},en --convert-subs srt"
          fi
          DATE=$(date +'%Y-%m-%d_%H-%M-%S')
          yt-dlp -f "${{ github.event.inputs.quality }}" $SUBS_OPTION -o "${DATE} - %(title)s.%(ext)s" "${{ github.event.inputs.url }}"

      - name: Upload video (and subtitles) to Google Drive
        env:
          GDRIVE_CREDS: ${{ secrets.GDRIVE_CREDS }}
          GDRIVE_FOLDER_ID: ${{ github.event.inputs.gdrive_folder_id }}
        run: |
          python3 <<EOF
          import os, json, glob
          from pydrive.auth import GoogleAuth
          from pydrive.drive import GoogleDrive
          from oauth2client.service_account import ServiceAccountCredentials

          # Load credentials from environment
          creds_dict = json.loads(os.environ['GDRIVE_CREDS'])
          folder_id = os.environ['GDRIVE_FOLDER_ID']

          # Authenticate using service account
          scopes = ['https://www.googleapis.com/auth/drive']
          credentials = ServiceAccountCredentials.from_json_keyfile_dict(creds_dict, scopes)
          gauth = GoogleAuth()
          gauth.credentials = credentials
          drive = GoogleDrive(gauth)

          # Upload all relevant files
          for filename in glob.glob("*"):
              if filename.endswith(('.mp4', '.mkv', '.webm', '.srt')):
                  file_drive = drive.CreateFile({
                      'title': os.path.basename(filename),
                      'parents': [{'id': folder_id}]
                  })
                  file_drive.SetContentFile(filename)
                  file_drive.Upload()
                  print(f"Uploaded {filename} to Google Drive folder {folder_id}")
          EOF