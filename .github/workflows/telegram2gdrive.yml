name: Telegram → Google Drive

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: 'Telegram post link'
        required: true
        type: string

      gdrive_folder:
        description: 'Google Drive folder ID, shared-folder URL, or folder path (example: Telegram/Movies)'
        required: true
        type: string

      download_method:
        description: 'Download method'
        required: true
        type: choice
        default: 'yt-dlp'
        options:
          - yt-dlp
          - telethon

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Cache dependencies for faster future runs
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-telegram-gdrive-v1
          restore-keys: |
            ${{ runner.os }}-telegram-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 python3-pip ffmpeg

          python3 -m pip install --upgrade pip

          pip3 install \
            yt-dlp \
            telethon \
            google-api-python-client \
            google-auth \
            google-auth-httplib2 \
            google-auth-oauthlib

      - name: Download Telegram media/files
        id: download
        run: |
          python3 << 'EOF'

          import os
          import re
          import uuid
          import asyncio
          import subprocess
          import sys

          from telethon import TelegramClient
          from telethon.sessions import StringSession

          tg_url = os.environ["TG_LINK"]

          method = os.environ.get("DOWNLOAD_METHOD", "yt-dlp")

          temp_dir = f"/tmp/tgdl_{uuid.uuid4().hex}"
          os.makedirs(temp_dir, exist_ok=True)

          # --------------------------------------------------
          # TELETHON DOWNLOAD
          # --------------------------------------------------

          async def telethon_download():

              api_id = os.environ.get("TG_API_ID")
              api_hash = os.environ.get("TG_API_HASH")
              session = os.environ.get("TG_SESSION")

              if not api_id or not api_hash or not session:
                  print("Telethon secrets missing. Falling back to yt-dlp...")
                  return False

              m = re.search(r't\.me/([^/]+)/(?:(\d+)|[^/]+/(\d+))', tg_url)

              if not m:
                  raise Exception("Invalid Telegram link")

              channel = m.group(1)
              post_id = int(m.group(2) or m.group(3))

              client = TelegramClient(
                  StringSession(session),
                  int(api_id),
                  api_hash
              )

              await client.start()

              entity = await client.get_entity(channel)

              message = await client.get_messages(
                  entity,
                  ids=post_id
              )

              if not message:
                  raise Exception("Message not found")

              messages = []

              # Handle albums/media groups
              if message.grouped_id:

                  msgs = await client.get_messages(entity, limit=50)

                  for msg in msgs:
                      if msg.grouped_id == message.grouped_id:
                          messages.append(msg)

                  messages.reverse()

              else:
                  messages.append(message)

              downloaded = 0

              for idx, msg in enumerate(messages, start=1):

                  if not msg.media:
                      continue

                  print(f"Downloading item {idx}...")

                  await client.download_media(
                      msg,
                      file=temp_dir
                  )

                  downloaded += 1

              await client.disconnect()

              print(f"Downloaded files: {downloaded}")

              return downloaded > 0

          # --------------------------------------------------
          # YT-DLP DOWNLOAD
          # --------------------------------------------------

        def ytdlp_download():

            print("Using yt-dlp download method...")

            cmd = [
                "yt-dlp",
                "--ignore-errors",
                "--no-playlist",

                # IMPORTANT FIXES
                "--restrict-filenames",
                "--trim-filenames", "80",

                # Short predictable filenames
                "-o",
                os.path.join(
                    temp_dir,
                    "%(id)s_%(title).80s.%(ext)s"
                ),

                tg_url
            ]

            result = subprocess.run(cmd)

            if result.returncode != 0:
                raise Exception("yt-dlp download failed")

          # --------------------------------------------------
          # MAIN LOGIC
          # --------------------------------------------------

          success = False

          if method == "telethon":
              try:
                  success = asyncio.run(telethon_download())
              except Exception as e:
                  print(f"Telethon failed: {e}")
                  print("Falling back to yt-dlp...")

          if not success:
              ytdlp_download()

          files = os.listdir(temp_dir)

          if not files:
              raise Exception("No files downloaded")

          print("Downloaded files:")
          for f in files:
              print(f" - {f}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"temp_dir={temp_dir}\n")

          EOF
        env:
          TG_LINK: ${{ github.event.inputs.telegram_link }}
          DOWNLOAD_METHOD: ${{ github.event.inputs.download_method }}

          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}

      - name: Upload all files to Google Drive
        run: |
          python3 << 'EOF'

          import os
          import re

          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          temp_dir = os.environ["TEMP_DIR"]
          folder_input = os.environ["GDRIVE_FOLDER"].strip()

          creds = Credentials(
              None,
              refresh_token=os.environ["GDRIVE_REFRESH_TOKEN"],
              token_uri="https://oauth2.googleapis.com/token",
              client_id=os.environ["GDRIVE_CLIENT_ID"],
              client_secret=os.environ["GDRIVE_CLIENT_SECRET"],
              scopes=["https://www.googleapis.com/auth/drive"]
          )

          creds.refresh(Request())

          service = build("drive", "v3", credentials=creds)

          def extract_folder_id(value):
              value = value.strip()

              # Full folder URL
              match = re.search(r'/folders/([a-zA-Z0-9_-]+)', value)
              if match:
                  return match.group(1)

              # Raw folder ID
              if re.fullmatch(r'[a-zA-Z0-9_-]{10,}', value):
                  return value

              return None

          def get_or_create_folder(folder_name, parent_id=None):

              query = (
                  f"name = '{folder_name}' "
                  f"and mimeType = 'application/vnd.google-apps.folder' "
                  f"and trashed = false"
              )

              if parent_id:
                  query += f" and '{parent_id}' in parents"

              results = service.files().list(
                  q=query,
                  spaces='drive',
                  fields='files(id, name)',
                  pageSize=1
              ).execute()

              folders = results.get('files', [])

              if folders:
                  return folders[0]['id']

              metadata = {
                  'name': folder_name,
                  'mimeType': 'application/vnd.google-apps.folder'
              }

              if parent_id:
                  metadata['parents'] = [parent_id]

              folder = service.files().create(
                  body=metadata,
                  fields='id'
              ).execute()

              return folder['id']

          # --------------------------------------------------
          # Resolve target Google Drive folder
          # --------------------------------------------------

          folder_id = extract_folder_id(folder_input)

          # Folder path mode (example: Telegram/Movies)
          if not folder_id:

              current_parent = None

              for part in [p.strip() for p in folder_input.split('/') if p.strip()]:
                  current_parent = get_or_create_folder(part, current_parent)

              folder_id = current_parent

          if not folder_id:
              raise Exception("Could not resolve Google Drive folder")

          print(f"Uploading files to folder ID: {folder_id}")

          uploaded = 0

          for file_name in os.listdir(temp_dir):

              file_path = os.path.join(temp_dir, file_name)

              if not os.path.isfile(file_path):
                  continue

              print(f"Uploading: {file_name}")

              file_metadata = {
                  "name": file_name,
                  "parents": [folder_id]
              }

              media = MediaFileUpload(
                  file_path,
                  resumable=True
              )

              service.files().create(
                  body=file_metadata,
                  media_body=media
              ).execute()

              uploaded += 1

          print(f"Uploaded files: {uploaded}")

          EOF
        env:
          TEMP_DIR: ${{ steps.download.outputs.temp_dir }}
          GDRIVE_FOLDER: ${{ github.event.inputs.gdrive_folder }}

          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
